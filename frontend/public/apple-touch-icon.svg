<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo com gradiente -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B1230;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C2185B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD6E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Coração grande (preenchido) -->
  <path filter="url(#glow)"
    d="M256 370
       C256 370 110 280 110 185
       C110 140 145 110 185 110
       C210 110 235 125 256 148
       C277 125 302 110 327 110
       C367 110 402 140 402 185
       C402 280 256 370 256 370Z"
    fill="url(#heartGrad)"
    opacity="0.95"
  />

  <!-- Brilho suave no topo do coração -->
  <ellipse cx="210" cy="160" rx="30" ry="18" fill="white" opacity="0.25" transform="rotate(-30 210 160)"/>
</svg>
